name: Daily Reds Data Load

on:
  workflow_dispatch:

  schedule:
    # GitHub cron runs in UTC.
    # During daylight savings time: 09:17 UTC = 5:17 AM ET, 18:00 UTC = 2:00 PM ET.
    - cron: "17 9 * * *"
    - cron: "0 18 * * *"

jobs:
  load-reds-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase python-dotenv

      #################################################
      # Reds Batting Loader
      #################################################

      - name: Load Reds Batting Data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MLB_TEAM_ID: "113"
          MLB_SEASON: "2026"
        run: python scripts/load_reds_batting.py

      #################################################
      # Reds Batting Splits Loader
      #################################################

      - name: Load Reds Batting Splits Data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MLB_TEAM_ID: "113"
          MLB_SEASON: "2026"
        run: python scripts/load_reds_splits.py

      #################################################
      # Reds Matchup Loader
      #################################################

      - name: Load Reds Matchup Data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MLB_TEAM_ID: "113"
          MLB_SEASON: "2026"
        run: python scripts/load_reds_matchup.py

      #################################################
      # Batter vs Pitcher History Loader
      #################################################

      - name: Load Batter vs Pitcher History
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MLB_TEAM_ID: "113"
          MLB_SEASON: "2026"
        run: python scripts/load_batter_vs_pitcher.py

      #################################################
      # Save Matchup Prediction Snapshot
      #################################################

      - name: Save Matchup Prediction Snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MLB_TEAM_ID: "113"
          MATCHUP_WINDOW: "10"
        run: python scripts/save_matchup_predictions.py

      #################################################
      # Update Prediction Actuals
      #################################################

      - name: Update Prediction Actuals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MLB_TEAM_ID: "113"
        run: python scripts/update_prediction_actuals.py
