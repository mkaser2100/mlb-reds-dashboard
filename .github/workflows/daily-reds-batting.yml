name: Daily Reds Batting Loader

on:
  schedule:
    # Runs daily at 9:30 AM UTC, around 5:30 AM Eastern during daylight saving time.
    - cron: "30 9 * * *"

  workflow_dispatch:

jobs:
  load-reds-batting:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load Reds batting data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MLB_TEAM_ID: "113"
          MLB_SEASON: "2026"
        run: python scripts/load_reds_batting.py
