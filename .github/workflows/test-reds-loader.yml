name: Test Reds Loader

on:
  workflow_dispatch:

jobs:
  test-reds-loader:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Show branch and commit
        run: |
          echo "Current branch:"
          git branch --show-current
          echo "Current commit:"
          git rev-parse HEAD
          echo "Latest commit message:"
          git log -1 --pretty=%B

      - name: Inspect loader file
        run: |
          echo "Line count:"
          wc -l scripts/load_reds_batting.py
          echo "Version marker:"
          grep -n "SCRIPT_VERSION" scripts/load_reds_batting.py || true
          echo "Missing player function:"
          grep -n "ensure_players_exist" scripts/load_reds_batting.py || true
          echo "First 30 lines:"
          sed -n '1,30p' scripts/load_reds_batting.py
          echo "Main function section:"
          grep -n -A 40 "def main" scripts/load_reds_batting.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load Reds batting data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MLB_TEAM_ID: "113"
          MLB_SEASON: "2026"
        run: python scripts/load_reds_batting.py
