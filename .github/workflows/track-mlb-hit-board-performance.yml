name: Track MLB Hit Board Performance

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "snapshot, actuals, or both"
        required: false
        default: "both"
      windows:
        description: "Comma-separated model windows"
        required: false
        default: "3,5,6,10,15"

  schedule:
    # Morning snapshot before most games. Adjust if needed.
    - cron: "00 15 * * *"
    # Next morning actuals refresh after games have completed and logs loaded.
    - cron: "00 11 * * *"

jobs:
  track-mlb-hit-board-performance:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase

      - name: Track MLB Hit Board Performance
        run: |
          MODE="${{ github.event.inputs.mode }}"
          WINDOWS="${{ github.event.inputs.windows }}"
          if [ -z "$MODE" ]; then
            # Scheduled runs use both safely: snapshot is idempotent, actuals update only if logs exist.
            MODE="both"
          fi
          if [ -z "$WINDOWS" ]; then
            WINDOWS="3,5,6,10,15"
          fi
          python scripts/track_mlb_hit_board_performance.py --mode "$MODE" --windows "$WINDOWS"
