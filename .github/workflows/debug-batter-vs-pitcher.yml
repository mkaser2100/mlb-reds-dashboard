name: Debug Batter vs Pitcher

on:
  workflow_dispatch:

jobs:
  debug-bvp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Debug Batter vs Pitcher Endpoint
        run: python scripts/debug_batter_vs_pitcher.py
