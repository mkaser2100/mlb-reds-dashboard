name: Load Hit Prop Market Odds

on:
  workflow_dispatch:
  schedule:
    # 8:00 AM EDT (12:00 UTC)
    - cron: "0 12 * * *"

    # 12:00 PM EDT (16:00 UTC)
    - cron: "0 16 * * *"

jobs:
  load-hit-prop-market-odds:
    runs-on: ubuntu-latest

    timeout-minutes: 15

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}

      # Loader configuration
      SPORT_KEY: baseball_mlb
      MARKET_KEY: batter_hits
      BOOKMAKERS: draftkings,bet365
      MAX_EVENTS_PER_RUN: 15
      SKIP_STARTED_GAMES: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-hit-prop-odds.txt

      - name: Verify configuration
        run: |
          echo "Sport: $SPORT_KEY"
          echo "Market: $MARKET_KEY"
          echo "Books: $BOOKMAKERS"
          echo "Max Events: $MAX_EVENTS_PER_RUN"
          echo "Skip Started Games: $SKIP_STARTED_GAMES"

      - name: Load MLB Hit Prop Market Odds
        run: |
          python scripts/load_hit_prop_market_odds.py

      - name: Upload loader log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hit-prop-loader-log
          path: |
            *.log
            logs/**
          if-no-files-found: ignore
