name: Run V3 Hit Model

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional MLB prediction date in YYYY-MM-DD. Defaults to today's Eastern date."
        required: false
        type: string

  # Prefer running V3 only after the upstream Phase 1 refresh completes.
  workflow_run:
    workflows: ["Load All MLB Phase 1 Data"]
    types: [completed]

  schedule:
    # Backup scheduled run at 12:30 UTC / 8:30 AM EDT.
    # This should run after the normal MLB/V2/feature refresh.
    - cron: "30 12 * * *"

jobs:
  run-v3-hit-model:
    runs-on: ubuntu-latest

    # If triggered by workflow_run, only run when the upstream workflow succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TARGET_DATE: ${{ github.event.inputs.target_date }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-v3-ml.txt
          pip install supabase

      - name: Validate V3 feature source is current
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from supabase import create_client

          supabase = create_client(
              os.environ["SUPABASE_URL"],
              os.environ["SUPABASE_SERVICE_ROLE_KEY"],
          )

          input_date = (os.getenv("TARGET_DATE") or "").strip()
          target_date = input_date or datetime.now(ZoneInfo("America/New_York")).date().isoformat()

          print(f"Expected V3 prediction date: {target_date}")

          today_result = (
              supabase
              .table("v_mlb_ml_today_features_v3")
              .select("prediction_run_date,game_date,game_pk,player_id", count="exact")
              .eq("prediction_run_date", target_date)
              .limit(1)
              .execute()
          )

          today_count = today_result.count or 0
          print(f"V3 feature rows for {target_date}: {today_count}")

          if today_count <= 0:
              latest_result = (
                  supabase
                  .table("v_mlb_ml_today_features_v3")
                  .select("prediction_run_date,game_date")
                  .order("prediction_run_date", desc=True)
                  .limit(5)
                  .execute()
              )
              print("Latest feature dates returned by v_mlb_ml_today_features_v3:")
              print(latest_result.data)

              raise RuntimeError(
                  "Stale or missing V3 feature input. "
                  f"Expected v_mlb_ml_today_features_v3 to contain prediction_run_date={target_date}. "
                  "Run/fix the upstream MLB Phase 1 data refresh before running V3."
              )

          print("V3 feature preflight passed.")
          PY

      - name: Train and score V3 hit model
        run: |
          python scripts/train_score_v3_hit_model.py

      - name: Validate V3 predictions were written for target date
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from supabase import create_client

          supabase = create_client(
              os.environ["SUPABASE_URL"],
              os.environ["SUPABASE_SERVICE_ROLE_KEY"],
          )

          input_date = (os.getenv("TARGET_DATE") or "").strip()
          target_date = input_date or datetime.now(ZoneInfo("America/New_York")).date().isoformat()

          result = (
              supabase
              .table("mlb_ml_predictions_v3")
              .select("prediction_id,model_run_id", count="exact")
              .eq("target_name", "hit_1plus")
              .eq("prediction_run_date", target_date)
              .limit(5)
              .execute()
          )

          row_count = result.count or 0
          print(f"V3 prediction rows for {target_date}: {row_count}")
          print("Sample rows:")
          print(result.data)

          if row_count <= 0:
              raise RuntimeError(
                  f"V3 model completed but no predictions were written for {target_date}."
              )

          print("V3 prediction write validation passed.")
          PY
