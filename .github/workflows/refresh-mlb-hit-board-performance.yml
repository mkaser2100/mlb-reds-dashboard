name: Refresh MLB Hit Board Performance

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Number of historical days to refresh"
        required: false
        default: "3"

  schedule:
    # GitHub cron runs in UTC.
    # 11:00 UTC = 7:00 AM ET during daylight savings time.
    - cron: "0 11 * * *"

concurrency:
  group: refresh-mlb-hit-board-performance
  cancel-in-progress: false

jobs:
  refresh-mlb-hit-board-performance:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase

      - name: Snapshot MLB Hit Board predictions
        run: |
          python scripts/track_mlb_hit_board_performance.py --mode snapshot

      - name: Update MLB Hit Board actuals
        run: |
          python scripts/track_mlb_hit_board_performance.py --mode actuals

      - name: Refresh incremental MLB Hit Board performance
        run: |
          DAYS_BACK="${{ github.event.inputs.days_back }}"
          if [ -z "$DAYS_BACK" ]; then
            DAYS_BACK="3"
          fi
          python scripts/refresh_mlb_hit_board_performance.py --days-back "$DAYS_BACK"
