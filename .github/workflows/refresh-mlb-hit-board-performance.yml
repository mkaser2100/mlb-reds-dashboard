name: Refresh MLB Hit Board Performance

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Number of historical days to refresh"
        required: false
        default: "1"

  schedule:
    # Run after the main game-log loader has had time to finish.
    # 12:30 UTC is usually early morning ET.
    - cron: "30 12 * * *"

jobs:
  refresh-mlb-hit-board-performance:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase

      - name: Refresh incremental MLB Hit Board performance
        run: |
          DAYS_BACK="${{ github.event.inputs.days_back }}"
          if [ -z "$DAYS_BACK" ]; then
            DAYS_BACK="1"
          fi
          python scripts/refresh_mlb_hit_board_performance.py --days-back "$DAYS_BACK"
