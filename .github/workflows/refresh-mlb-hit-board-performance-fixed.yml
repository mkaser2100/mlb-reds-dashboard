name: Refresh MLB Hit Board Performance

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Number of historical days to refresh"
        required: false
        default: "1"

  workflow_run:
    workflows:
      - Load All MLB Phase 1 Data
    types:
      - completed

jobs:
  refresh-mlb-hit-board-performance:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase

      - name: Refresh incremental MLB Hit Board performance
        run: |
          DAYS_BACK="${{ github.event.inputs.days_back }}"
          if [ -z "$DAYS_BACK" ]; then
            DAYS_BACK="1"
          fi
          python scripts/refresh_mlb_hit_board_performance.py --days-back "$DAYS_BACK"
