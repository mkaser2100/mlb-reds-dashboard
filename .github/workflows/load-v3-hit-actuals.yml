name: Load V3 Hit Actuals

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 11:15 UTC / 7:15 AM ET.
    # Make sure this runs AFTER your MLB batting game-log refresh.
    - cron: "15 11 * * *"

jobs:
  load-v3-hit-actuals:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase

      - name: Load yesterday V3 hit actuals
        run: |
          python - <<'PY'
          import os
          from datetime import date, timedelta
          from supabase import create_client

          supabase = create_client(
              os.environ["SUPABASE_URL"],
              os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          )

          target_date = date.today() - timedelta(days=1)

          result = supabase.rpc(
              "load_mlb_v3_actuals",
              {
                  "target_prediction_date": str(target_date),
                  "target_name_filter": "hit_1plus"
              }
          ).execute()

          print(f"Loaded V3 hit actuals for {target_date}")
          print(result.data)
          PY
